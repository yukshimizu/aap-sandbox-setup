---
- name: Delete the AAP VM on Azure
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Fail if variables not defined
      ansible.builtin.assert:
        that:
          - az_resource_group is defined
          - aap_vm_name is defined
          - aap_vm_type is defined
          - purpose is defined
        fail_msg: "Required variables not set"

    - name: Check if the VM is already provisioned
      azure.azcollection.azure_rm_virtualmachine_info:
        resource_group: "{{ az_resource_group }}"
        name: "{{ aap_vm_name }}"
        tags:
          - "purpose:demo"
          - "type:aap"
      register: existing_vm
      ignore_errors: true

    - name: Delete the VM
      azure.azcollection.azure_rm_virtualmachine:
        resource_group: "{{ az_resource_group }}"
        name: "{{ aap_vm_name }}"
        remove_on_absent: all
        state: absent
      when: existing_vm.vms is defined and existing_vm.vms | length > 0
